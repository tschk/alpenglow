name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  os-appliance:
    name: Alpenglow OS appliance gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check appliance OS policy
        run: scripts/ci-os-appliance.sh

  glowfs-kernel-module:
    name: Alpenglow GlowFS kernel module compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Compile GlowFS module against Linux headers
        run: scripts/ci-glowfs-kernel-module.sh

  rust-core:
    name: Alpenglow Rust core gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust core
        run: scripts/ci-rust-core.sh

  rust-kernel-module:
    name: Rust kernel module compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install bindgen
        run: cargo install bindgen-cli --locked 2>/dev/null
      - name: Build Rust kernel module
        run: scripts/ci-rust-kernel-module.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null
      - name: Run cargo audit
        run: cargo audit --deny warnings 2>&1 || echo "cargo audit found issues (non-blocking)"

  zig:
    name: Alpenglow Zig gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Check Zig code
        run: scripts/ci-zig.sh
