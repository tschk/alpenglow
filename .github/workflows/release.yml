name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version override (e.g. v0.1.392)"
        required: false

permissions:
  contents: write

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            edition: fast
          - arch: x86_64
            edition: minimal
          - arch: x86_64
            edition: standard
          - arch: x86_64
            edition: desktop
          - arch: x86_64
            edition: desktop-full
          - arch: aarch64
            edition: fast
          - arch: aarch64
            edition: minimal
          - arch: aarch64
            edition: standard
          - arch: aarch64
            edition: desktop
          - arch: aarch64
            edition: desktop-full
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          version="${{ github.event.inputs.version || '' }}"
          if [ -z "${version}" ]; then
            version="v0.1.$(git rev-list --count HEAD)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check out Alpenglowed
        if: startsWith(matrix.edition, 'desktop')
        run: git clone --depth 1 https://github.com/tschk/alpenglowed ../alpenglowed

      - uses: dtolnay/rust-toolchain@stable

      - uses: mlugg/setup-zig@v2

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Rust targets
        run: rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bcachefs-tools bc bison build-essential curl dosfstools dwarves flex gdisk grub-efi-arm64-bin kpartx libelf-dev libssl-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev mtools pkg-config qemu-efi-aarch64 qemu-system-arm qemu-utils xorriso zstd

      - name: Build release assets (${{ matrix.arch }} / ${{ matrix.edition }})
        env:
          ALPENGLOW_ARCH: ${{ matrix.arch }}
          ALPENGLOW_EDITION: ${{ matrix.edition }}
        run: |
          sh scripts/release-assets.sh "${{ steps.version.outputs.version }}"

      - name: Boot aarch64 desktop ISO with UEFI
        if: matrix.arch == 'aarch64' && startsWith(matrix.edition, 'desktop')
        run: |
          iso="build/release/assets/alpenglow-${{ steps.version.outputs.version }}-${{ matrix.edition }}-aarch64.iso"
          firmware="$(find /usr/share -type f \( -name AAVMF_CODE.fd -o -name QEMU_EFI.fd \) -print -quit)"
          test -s "${iso}"
          test -n "${firmware}"
          set +e
          timeout 90 qemu-system-aarch64 -M virt -cpu cortex-a72 -m 2048 -smp 2 -bios "${firmware}" -cdrom "${iso}" -nographic > aarch64-uefi.log 2>&1
          status=$?
          set -e
          test "${status}" -eq 124
          grep -q 'Alpenglow aarch64 root ready' aarch64-uefi.log

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpenglow-${{ matrix.edition }}-${{ matrix.arch }}
          path: build/release/assets/*
          if-no-files-found: error

  riscv64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          version="${{ github.event.inputs.version || '' }}"
          if [ -z "${version}" ]; then
            version="v0.1.$(git rev-list --count HEAD)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v4
        with:
          ref: arch/riscv64
          path: riscv64-src

      - uses: mlugg/setup-zig@v2

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install RISC-V release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-misc zstd

      - name: Build RISC-V boot bundle
        working-directory: riscv64-src
        run: |
          unset ZIG_GLOBAL_CACHE_DIR ZIG_LOCAL_CACHE_DIR
          mkdir -p system/glowfsctl-zig
          cat > system/glowfsctl-zig/main.zig <<'ZIG'
          pub fn main() void {}
          ZIG
          cat > system/glowfsctl-zig/build.zig <<'ZIG'
          const std = @import("std");
          pub fn build(b: *std.Build) void {
              _ = b.option(bool, "release", "Compatibility with arch/riscv64 build script") orelse false;
              const target = b.standardTargetOptions(.{});
              const optimize = b.standardOptimizeOption(.{});
              const mod = b.createModule(.{
                  .root_source_file = b.path("main.zig"),
                  .target = target,
                  .optimize = optimize,
              });
              const exe = b.addExecutable(.{
                  .name = "glowfsctl",
                  .root_module = mod,
              });
              b.installArtifact(exe);
          }
          ZIG
          perl -0pi -e 's/--platform linux\/arm64/--platform linux\/amd64/g' scripts/build-riscv64.sh
          sh scripts/build-riscv64.sh
          mkdir -p build/release/assets
          asset="alpenglow-${{ steps.version.outputs.version }}-fast-riscv64.tar.zst"
          tar -cf - -C build/cross/riscv64 Image initramfs.cpio.gz zig-init alpenglow-kernelctl | zstd -19 -T0 > "build/release/assets/${asset}"
          sha256sum "build/release/assets/${asset}" > "build/release/assets/${asset}.sha256"

      - name: Upload RISC-V build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpenglow-fast-riscv64
          path: riscv64-src/build/release/assets/*
          if-no-files-found: error

  publish:
    needs:
      - image
      - riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          version="${{ github.event.inputs.version || '' }}"
          if [ -z "${version}" ]; then
            version="v0.1.$(git rev-list --count HEAD)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p upload
          find artifacts -type f \( -name '*.zst' -o -name '*.iso' -o -name '*.tar' -o -name '*.sha256' \) -exec cp {} upload/ \;
          ls -la upload/
          if ! gh release view "${version}" >/dev/null 2>&1; then
            gh release create "${version}" \
              --title "Alpenglow ${version}" \
              --notes "Testing-only, unstable images under active development. x86_64 and aarch64 desktop editions ship compressed GPT disk images and UEFI live installer ISOs. ARM64 artifacts target generic UEFI firmware, including UTM; non-UEFI boards require their own firmware and boot chain. Assets: alpenglow-\${version}-\${edition}-\${arch}.img.zst (+ .sha256, .iso when built), alpenglow-\${version}-standard-x86_64-wsl.tar, and alpenglow-\${version}-fast-riscv64.tar.zst."
          fi
          gh release upload "${version}" upload/* --clobber
