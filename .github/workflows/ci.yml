name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  os-appliance:
    name: Alpenglow OS appliance gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check appliance OS policy
        run: scripts/ci-os-appliance.sh

  rust-core:
    name: Alpenglow Rust core gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust core
        run: scripts/ci-rust-core.sh

  rust-kernel-module:
    name: Rust kernel module compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq flex bison bc libssl-dev libelf-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Install bindgen
        run: cargo install bindgen-cli --locked 2>/dev/null
      - name: Install kernel dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq flex bison bc libssl-dev libelf-dev
      - name: Build Rust kernel module
        run: scripts/ci-rust-kernel-module.sh

  rust-audit:
    name: Alpenglow Rust dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null
      - name: Run cargo audit
        run: cargo audit --deny warnings 2>&1 || echo "cargo audit found issues (non-blocking)"

  zig:
    name: Alpenglow Zig gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Check Zig code
        run: scripts/ci-zig.sh

  aarch64-cross-compile:
    name: aarch64 cross-compile (no kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install file
        run: sudo apt-get update -qq && sudo apt-get install -y -qq file
      - name: Cross-compile aarch64 Zig init and kernelctl
        run: scripts/ci-aarch64-cross.sh

  v86-initramfs:
    name: v86 browser initramfs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build v86 initramfs and verify /init
        run: scripts/ci-v86-initramfs.sh
